<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感情の地図 - おしえてかめさん</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Mood Meter</h1>
        <p>今のあなたの「エネルギー」と「フィーリング」はどこですか？</p>
    </header>

    <main>
        <div class="meter-container">
            <div class="y-axis-label">高い ↑ エネルギー ↓ 低い</div>
            
            <div id="mood-grid" class="grid"></div>
            
            <div class="x-axis-label">← 不快 (Unpleasant)　　快 (Pleasant) →</div>
        </div>

        <div id="result-display" class="result-card">
            <p class="instruction">マスをクリックして、感情を言語化してみましょう</p>
            <h2 id="selected-emotion-jp">-</h2>
            <p id="selected-emotion-en">-</p>
        </div>
    </main>

    <footer>
        <p>© おしえてかめさん | Based on Yale Center for Emotional Intelligence</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
