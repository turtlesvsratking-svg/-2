<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教えてカメさん - Mood Meter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>教えてカメさん Mood Meter</h1>
        <p>今のあなたの「エネルギー」と「フィーリング」はどこ？</p>
    </header>

    <main>
        <div class="meter-container">
            <div class="y-axis-label">
                <span>高 い</span>
                <span class="vertical-text">エネルギー</span>
                <span>低 い</span>
            </div>

            <div class="grid-wrapper">
                <div class="y-numbers">
                    <span>10</span><span>9</span><span>8</span><span>7</span><span>6</span>
                    <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
                </div>
                
                <div id="mood-grid" class="grid"></div>

                <div></div>
                
                <div class="x-numbers">
                    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                    <span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
                </div>
            </div>

            <div class="x-axis-label">
                <span>← 不快 (Unpleasant)</span>
                <span>快 (Pleasant) →</span>
            </div>
        </div>

        <div id="result-display" class="result-card">
            <p class="instruction">マスをクリックして、感情を言語化してみましょう</p>
            <h2 id="selected-emotion-jp">-</h2>
            <p id="selected-emotion-en">-</p>
        </div>
    </main>

    <footer>
        <p>© 教えてカメさん | Based on Yale Center for Emotional Intelligence</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
